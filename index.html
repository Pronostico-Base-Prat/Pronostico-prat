<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Prat | Sistema Meteorológico Autónomo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1a3a5a; --bg: #f4f7f9;
            --color-bajo: #92d050;    --bg-bajo: #f2f9ec;
            --color-mod: #ffc000;      --bg-mod: #fff9e6;
            --color-alto: #ed7d31;    --bg-alto: #fff2e6;
            --color-peligro: #ff0000;  --bg-peligro: #ffe6e6;
            --twitter-blue: #1DA1F2;
        }

        /* RESET Y ESTRUCTURA BASE */
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR RESPONSIVO */
        .sidebar { 
            width: 260px; background: var(--navy); color: white; display: flex; 
            flex-direction: column; padding: 20px; flex-shrink: 0; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 10; overflow-y: auto;
        }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; min-width: 0; }

        /* --- CAMBIOS PARA CELULARES --- */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; box-sizing: border-box; height: auto; padding: 15px; }
            .main-content { height: auto; overflow: visible; }
            header { padding: 20px !important; min-height: 300px !important; }
            .location-title { font-size: 2rem !important; }
            .current-metrics { width: 100% !important; flex-wrap: wrap; justify-content: center; }
            .grid-container { padding: 15px !important; grid-template-columns: 1fr !important; }
            .charts-grid { grid-template-columns: 1fr !important; }
        }

        /* RESTO DE ESTILOS IGUALES AL ORIGINAL */
        .sidebar img { width: 100px; height: auto; display: block; margin: 0 auto 10px; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.4)); }
        .sidebar h2 { font-size: 0.8rem; text-align: center; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .sidebar-nav { display: flex; flex-direction: column; gap: 5px; }
        .external-link { color: #bdc3c7; text-decoration: none; font-size: 0.75rem; padding: 8px; border-radius: 4px; background: rgba(255,255,255,0.05); }
        .external-link:hover { background: rgba(255,255,255,0.15); color: white; }

        header { 
            background: linear-gradient(to top, rgba(244,247,249,1) 0%, rgba(244,247,249,0.2) 40%, rgba(0,0,0,0.3) 100%), 
                        url('https://pronostico-base-prat.github.io/Pronostico-prat/fondo.jpg'); 
            background-size: cover; background-position: center; min-height: 450px; padding: 45px; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .location-title { font-size: 3.5rem; font-weight: 900; color: #0d1b2a; text-shadow: 0 2px 10px rgba(255,255,255,0.8); text-align: center; margin: 0; }
        
        .current-metrics { 
            display: flex; gap: 15px; align-items: center; background: rgba(255,255,255,0.9); 
            padding: 15px 25px; border-radius: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); align-self: center;
        }

        .metric-item { display: flex; flex-direction: column; align-items: center; }
        .metric-val { font-size: 1.1rem; font-weight: 900; }
        .metric-label { font-size: 0.6rem; text-transform: uppercase; color: #666; }

        .astro-bar { background: white; padding: 15px; display: flex; gap: 20px; overflow-x: auto; border-bottom: 1px solid #ddd; }
        .astro-item { flex-shrink: 0; text-align: center; }
        .astro-item label { display: block; font-size: 0.6rem; color: #999; font-weight: 700; }

        .days-nav { padding: 20px; display: flex; gap: 10px; overflow-x: auto; justify-content: center; }
        .day-tab { padding: 10px 20px; border-radius: 20px; background: white; border: 1px solid #ddd; cursor: pointer; font-weight: 700; white-space: nowrap; }
        .day-tab.active { background: var(--navy); color: white; }

        .grid-container { padding: 20px 45px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; border-top: 8px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .card-bajo { border-top-color: var(--color-bajo); }
        .card-mod { border-top-color: var(--color-mod); }
        .card-alto { border-top-color: var(--color-alto); animation: pulse 2s infinite; }
        .card-peligro { border-top-color: var(--color-peligro); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(237, 125, 49, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(237, 125, 49, 0); } }

        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .btn-full-day { grid-column: 1/-1; background: var(--navy); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; border-radius: 15px; }
        .chart-box { height: 200px; margin-bottom: 20px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <img src="https://pronostico-base-prat.github.io/Pronostico-prat/ESCUDO.png" alt="Escudo">
    <h2>Base Arturo Prat</h2>
    <nav class="sidebar-nav">
        <a href="https://web.directemar.cl/met/jturno/pub/GFS/animacion_foto.gif" target="_blank" class="external-link">Satélite</a>
        <a href="http://triton.directemar.cl/web/meteograma_A_BASEPRAT_Antartica_d02.png" target="_blank" class="external-link">Meteograma</a>
        <a href="https://www.shoa.cl/php/mareas?idioma=es" target="_blank" class="external-link">Mareas</a>
    </nav>
</aside>

<main class="main-content">
    <header>
        <h1 class="location-title">Puerto Soberanía</h1>
        <div class="current-metrics" id="header-metrics">Cargando...</div>
    </header>

    <div class="astro-bar">
        <div class="astro-item"><label>🌅 Salida</label><span>05:31</span></div>
        <div class="astro-item"><label>🌇 Puesta</label><span>20:50</span></div>
        <div class="astro-item"><label>⌚ Hora</label><span id="clock">--:--</span></div>
    </div>

    <div id="days-nav" class="days-nav"></div>
    <div class="grid-container" id="grid-pronostico"></div>
</main>

<div id="modalDetalle" class="modal">
    <div class="modal-content">
        <button onclick="document.getElementById('modalDetalle').style.display='none'">Cerrar</button>
        <div class="charts-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="chart-box"><canvas id="chartViento"></canvas></div>
            <div class="chart-box"><canvas id="chartTemp"></canvas></div>
        </div>
        <div id="modalTable" style="overflow-x:auto"></div>
    </div>
</div>

<script>
    const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRxJhBvpk3JZu0MWpKPZ2PMi2DYfEjxhSTWMbX4i_EHHI6rh9frJuskRuaX-OXJqc_Akz6Dh5qLr72/pub?output=csv";
    
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-CL', {timeZone: 'America/Punta_Arenas'});
    }

    async function fetchRealTime() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-62.48&longitude=-59.63&current=temperature_2m,wind_speed_10m,wind_direction_10m&wind_speed_unit=kn`);
            const d = await res.json();
            document.getElementById('header-metrics').innerHTML = `
                <div class="metric-item"><span class="metric-val">${d.current.temperature_2m}°C</span><span class="metric-label">Temp</span></div>
                <div class="metric-item"><span class="metric-val">${d.current.wind_speed_10m} kts</span><span class="metric-label">Viento</span></div>
            `;
        } catch(e) { console.log(e); }
    }

    function fetchCSV() {
        Papa.parse(URL_CSV, {
            download: true,
            complete: (results) => {
                const data = results.data.filter(r => r[0] && r[1]);
                window.allData = data;
                const dias = [...new Set(data.map(r => r[0]))];
                document.getElementById('days-nav').innerHTML = dias.map(d => `<div class="day-tab" onclick="render('${d}')">${d}</div>`).join('');
                render(dias[0]);
            }
        });
    }

    function render(dia) {
        const filtrado = window.allData.filter(r => r[0] === dia);
        let html = filtrado.map(r => {
            let risk = "card-bajo";
            if(r[4].includes("2") || r[4].includes("3")) risk = "card-alto";
            return `<div class="card ${risk}">
                <h3 style="margin:0 0 10px 0">${r[1]}</h3>
                <div class="data-row"><span>Cielo:</span><b>${r[2]}</b></div>
                <div class="data-row"><span>Viento:</span><b>${r[4]}</b></div>
                <div class="data-row"><span>Temp:</span><b>${r[6]}</b></div>
            </div>`;
        }).join('');
        document.getElementById('grid-pronostico').innerHTML = html;
    }

    setInterval(updateClock, 1000);
    fetchRealTime();
    fetchCSV();
</script>
</body>
</html>
